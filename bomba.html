    <style>
        /* Gren/Noise (Doku) Efekti ve Arkaplan */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* Narcissist albüm kapağındaki pürüzlü arkaplan dokusu */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Ana Konteyner */
        .container {
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            box-sizing: border-box;
            z-index: 2;
        }

        /* Başlık stili */
        h1 {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Alt Başlık */
        .subtitle {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #e50914;
            letter-spacing: 1px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        /* Buton Grubu */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Buton Tasarımı */
        .link-btn {
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 16px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        /* Butona Hover Yapınca */
        .link-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        /* Sağ Alttaki Parental Advisory Logosu */
        .parental-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            border: 1px solid #fff;
            padding: 4px 6px;
            font-size: 10px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: #000;
            user-select: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>aXLLXp</h1>
        <span class="subtitle">aXLLXp BİR BOMBADIR! 😃</span>

        <div class="links">
            <!-- Discord Butonu (Tıklayınca draxion_offical kopyalar) -->
            <div class="link-btn" onclick="kopyalaMetni(this, 'draxion_offical')">Discord</div>
            
            <!-- Roblox Butonu (Buraya kendi Roblox profil linkini koyabilirsin) -->
            <a href="https://www.roblox.com/tr/users/8890660115/profile?friendshipSourceType=PlayerSearch" target="_blank" class="link-btn">Roblox</a>

            <!-- OnlyFans Butonu (Tıklayınca siktir lan kopyalar) -->
            <div class="link-btn" onclick="kopyalaMetni(this, 'siktir lan')">OnlyFans</div>
        </div>
    </div>

    <div class="parental-badge">
        PARENTAL<br>ADVISORY<br><span style="font-size:8px;">EXPLICIT CONTENT</span>
    </div>

    <script>
        function kopyalaMetni(element, metin) {
            navigator.clipboard.writeText(metin).then(() => {
                const orijinalYazi = element.innerText;
                element.innerText = "KOPYALANDI!";
                setTimeout(() => {
                    element.innerText = orijinalYazi;
                }, 1000);
            }).catch(err => {
                console.error("Kopyalama başarısız oldu: ", err);
            });
        }
    </script>

</body>
</html>
